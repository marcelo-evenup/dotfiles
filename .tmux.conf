# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

# Dracula theme settings
set -g @dracula-show-powerline true
set -g @dracula-plugins "git time"
set -g @dracula-show-left-icon session
set -g @dracula-time-format "%H:%M"

# --- Extra Polish ---

# Start window/pane numbering at 1 (easier for fingers than 0)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable Mouse
set -g mouse on

# Pass VS Code IPC to new tmux panes/windows
set-option -g update-environment "VSCODE_IPC_HOOK_CLI"

# --- General ---
set -g history-limit 50000
set -g display-time 4000
set -g default-terminal "tmux-256color"
set -g extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# --- Keybindings (after TPM to avoid plugin overrides) ---

# Shift + Option + Left/Right: Navigate Windows
bind -n S-M-Left previous-window
bind -n S-M-Right next-window

# Shift + Option + Up/Down: Navigate Panes
bind -n S-M-Up select-pane -U
bind -n S-M-Down select-pane -D

# Shift + Option + \ : Vertical Split (Top/Bottom)
bind -n M-| split-window -v -c "#{pane_current_path}"

# Shift + Option + n : New Window
bind -n M-N new-window -c "#{pane_current_path}"

# Shift + Option + r : Refresh VS Code IPC in all panes
bind -n M-R run-shell '~/dotfiles/refresh.sh'
